kind = "web"
previewPath = "/"
title = "Unity Global Stake"
version = "1.0.0"
id = "artifacts/usg-stake"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26265

[services.development]
run = "pnpm --filter @workspace/usg-stake run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/usg-stake", "run", "build" ]
publicDir = "artifacts/usg-stake/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26265"
BASE_PATH = "/"
